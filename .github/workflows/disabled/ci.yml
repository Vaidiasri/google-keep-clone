name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend lint & typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: todo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: todo/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - name: Production build
        env:
          VITE_BACKEND_MODE: hybrid
          VITE_API_URL_NODE: http://localhost:8080
          VITE_API_URL_PYTHON: http://localhost:8000
        run: npm run build

  docker:
    name: Docker build (all services)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Fastify image
        run: docker build -f todoBackend/Dockerfile todoBackend

      - name: Build FastAPI image
        run: docker build -f todo-fast-api/Dockerfile todo-fast-api

      - name: Build frontend image
        run: |
          docker build -f todo/Dockerfile todo \
            --build-arg VITE_BACKEND_MODE=hybrid \
            --build-arg VITE_API_URL_NODE=http://localhost:8080 \
            --build-arg VITE_API_URL_PYTHON=http://localhost:8000
