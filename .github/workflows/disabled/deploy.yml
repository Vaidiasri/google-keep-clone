name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER || 'taskflow' }}
  ECS_SERVICE_FASTIFY: ${{ vars.ECS_SERVICE_FASTIFY || 'taskflow-fastify' }}
  ECS_SERVICE_FASTAPI: ${{ vars.ECS_SERVICE_FASTAPI || 'taskflow-fastapi' }}

jobs:
  build-and-push-backends:
    name: Build & push ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: fastify
            context: todoBackend
            dockerfile: todoBackend/Dockerfile
            container: fastify
            ecs_service: taskflow-fastify
            task_def: infra/ecs/taskflow-fastify.json
          - service: fastapi
            context: todo-fast-api
            dockerfile: todo-fast-api/Dockerfile
            container: fastapi
            ecs_service: taskflow-fastapi
            task_def: infra/ecs/taskflow-fastapi.json
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/taskflow-${{ matrix.service }}:$IMAGE_TAG"
          docker build \
            -t "$IMAGE_URI" \
            -t "$ECR_REGISTRY/taskflow-${{ matrix.service }}:latest" \
            -f "${{ matrix.dockerfile }}" \
            "${{ matrix.context }}"
          docker push "$IMAGE_URI"
          docker push "$ECR_REGISTRY/taskflow-${{ matrix.service }}:latest"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Render ECS task definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ matrix.task_def }}
          container-name: ${{ matrix.container }}
          image: ${{ steps.build.outputs.image_uri }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ matrix.ecs_service }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  deploy-frontend:
    name: Deploy frontend to S3
    runs-on: ubuntu-latest
    needs: build-and-push-backends
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: todo/package-lock.json

      - name: Build SPA
        working-directory: todo
        env:
          VITE_BACKEND_MODE: hybrid
          VITE_API_URL_NODE: ${{ secrets.VITE_API_URL_NODE }}
          VITE_API_URL_PYTHON: ${{ secrets.VITE_API_URL_PYTHON }}
        run: |
          npm ci
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync todo/dist "s3://${{ secrets.S3_BUCKET }}" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html" \
            --exclude "*.html"
          aws s3 sync todo/dist "s3://${{ secrets.S3_BUCKET }}" \
            --cache-control "public,max-age=0,must-revalidate" \
            --exclude "*" \
            --include "*.html"

      - name: Invalidate CloudFront cache
        if: ${{ secrets.CLOUDFRONT_DIST_ID != '' }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DIST_ID }}" \
            --paths "/*"
