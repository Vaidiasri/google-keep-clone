<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="256" height="256" rx="56" ry="56" fill="url(#bgGrad)"/>

  <!-- Subtle inner glow -->
  <rect width="256" height="256" rx="56" ry="56" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="6"/>

  <!-- Checkmark -->
  <polyline
    points="60,128 104,172 196,84"
    fill="none"
    stroke="url(#checkGrad)"
    stroke-width="28"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
